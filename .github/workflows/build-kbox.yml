# Build kbox for Android aarch64.
# Uses NDK cross-compilation for both LKL (kernel library) and kbox itself.
name: Build for Android

on:
  push:
    branches: [main, infrastructure]
  pull_request:
    branches: [main]

jobs:
  commit-hygiene:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate commit log
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          range=
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            range="${PUSH_BEFORE_SHA}..${PUSH_HEAD_SHA}"
          fi
          if [ -n "$range" ]; then
            scripts/check-commitlog.sh --range "$range"
          else
            scripts/check-commitlog.sh
          fi

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-20 cppcheck
      - name: Check trailing newline
        run: .ci/check-newline.sh
      - name: Check clang-format
        run: .ci/check-format.sh
      - name: Security checks
        run: .ci/check-security.sh
      - name: Static analysis (cppcheck)
        run: .ci/check-cppcheck.sh

  build-android-lkl:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: android-ndk-r27
          key: ndk-r27-${{ runner.os }}

      - name: Install Android NDK (cache miss)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q android-ndk-r27-linux.zip
          rm android-ndk-r27-linux.zip

      - name: ccache config
        run: |
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=2G" >> "$GITHUB_ENV"

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-lkl-${{ runner.os }}-${{ hashFiles('scripts/fetch-lkl.sh', 'scripts/build-lkl-android.sh') }}
          restore-keys: |
            ccache-lkl-${{ runner.os }}-

      - name: Build LKL with NDK cross-compiler
        run: |
          ANDROID_NDK_HOME=$PWD/android-ndk-r27 \
          CCACHE=ccache \
          ./scripts/build-lkl-android.sh
        env:
          LKL_DIR: lkl-aarch64-android

      - name: Upload LKL artifact
        uses: actions/upload-artifact@v7
        with:
          name: lkl-aarch64-android
          path: lkl-aarch64-android/
          retention-days: 1

  build-android:
    needs: build-android-lkl
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Cache NDK
        uses: actions/cache@v5
        with:
          path: android-ndk-r27
          key: ndk-r27-${{ runner.os }}

      - name: Install Android NDK (cache miss)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q android-ndk-r27-linux.zip
          rm android-ndk-r27-linux.zip

      - name: Download LKL artifact
        uses: actions/download-artifact@v8
        with:
          name: lkl-aarch64-android
          path: lkl-aarch64-android/

      - name: Configure
        run: make defconfig
        env:
          ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r27

      - name: Build kbox for Android
        run: |
          make ANDROID=1 ANDROID_API=30 LKL_DIR=lkl-aarch64-android BUILD=release -j$(nproc)
        env:
          ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r27

      - name: Verify binary
        run: |
          file kbox | grep -q "aarch64" || { echo "Not an aarch64 binary"; exit 1; }
          file kbox | grep -q "statically linked" || { echo "Not statically linked"; exit 1; }

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: kbox-android-aarch64
          path: kbox
          retention-days: 1